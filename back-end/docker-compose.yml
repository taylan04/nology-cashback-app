version: '3.9'

services:
  db:
    image: postgres:15
    container_name: cashback_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cashback
    ports:
      - "5432:5432"

  api:
    build: .
    container_name: cashback_api
    depends_on:
      - db
    ports:
      - "8000:8000"
    env_file:
      - .env